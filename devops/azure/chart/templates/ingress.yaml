apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
{{ include "reservoir-ddms.commonAnnotations" . | indent 4}}      
    {{- if .Values.ingress.extraAnnotations }}
{{ toYaml .Values.ingress.extraAnnotations | indent 4 }}
    {{- end }}
{{ if .Values.ingress.hosts.host }}
    cert-manager.io/acme-challenge-type: http01
    cert-manager.io/cluster-issuer: letsencrypt-appgw
{{ end }}    

  labels:
{{ include "reservoir-ddms.commonLabels" . | indent 4}}
  name: {{ .Release.Name }}-ingress
  namespace: {{ $namespace }}
spec:
  rules:
  - http:
      paths:
      {{- with index .Values.configuration 0 }}
      - backend:
          service:
            name: {{ .service }}
            port:
              number: {{ $servicePort }}
        path: {{ .pathPrefix }}/*
        pathType: Prefix        
      {{- end -}}
{{ if .Values.ingress.hosts.host }}
    host: {{ .Values.ingress.hosts.host }}
{{ end }}
{{ if .Values.ingress.tlsSecret }}
  tls:
  - secretName: {{ .Values.ingress.tlsSecret }}
    hosts:
    - {{ .Values.ingress.hosts.host }}
{{ end }}    
{{- end -}}

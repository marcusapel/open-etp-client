{{- $namespace := .Release.Namespace }}
{{- $pullPolicy := .Values.pullPolicy -}}
{{- $servicePort := .Values.service.port -}}
{{- $replicaCount := .Values.global.replicaCount -}}
{{- $isAutoscalingEnabled := .Values.global.isAutoscalingEnabled}}
{{- $nodepool := .Values.global.nodepool}}
{{- $configMap := .Values.configMap -}}
{{- $version := .Chart.AppVersion -}}
{{- $release := .Release.Name }}
{{- range .Values.configuration }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" $release .service }}
  namespace: {{ $namespace }}
spec:
  replicas: {{ .replicaCount | default $replicaCount }}
  selector:
    matchLabels:
      app: {{ .service }}
  template:
    metadata:
      labels:
        app: {{ .service }}
        aadpodidbinding: osdu-identity
    spec:
{{- if $isAutoscalingEnabled }}
      nodeSelector:
        nodepool: {{ $nodepool }}
{{- end }}      
      volumes:
      {{- if .keyvault }}
        - name: azure-keyvault
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: azure-keyvault
      {{- end }}
      {{- range .pvc }}
        - name: {{ .volume }}
          persistentVolumeClaim:
            claimName: {{ .name }}-pvc
      {{- end }}
      terminationGracePeriodSeconds: 45
      containers:
        - name: {{ .service }}
          {{- if hasPrefix "<azure_acr>/" .repository }}
          {{- $repo := .repository | replace "<azure_acr>/" "msosdu.azurecr.io/" }}
          image: {{ $repo }}:{{ .tag | default $version }}
          {{- else }}
          image: {{ .repository }}:{{ .tag | default $version }}
          {{- end }}
          imagePullPolicy: {{ $pullPolicy | default "Always" }}
          lifecycle:
            preStop:
              exec:
                command: ["sleep","90"]
          #command: [ "node", "dist/src/lib/restApi/RestServer.js"]
          ports:
            - name: oetp
              containerPort: {{ $servicePort }}
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          {{- if .probe.enabled }}   
          livenessProbe:
            httpGet:
              path: {{ .pathPrefix }}
              port: {{ $servicePort }}
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .pathPrefix }}
              port: {{ $servicePort }}
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          {{- end }}
          {{- if or .request .limit }}
          resources:
          {{- end }}
          {{- if .request }}
            requests:
              cpu: {{ .request.cpu | quote }}
          {{- end }}
          {{- if .limit }}
            limits:
              cpu: {{ .limit.cpu | quote }}
          {{- end }}
          volumeMounts:
          {{- if .keyvault }}
          - name: azure-keyvault
            mountPath: "/mnt/azure-keyvault"
            readOnly: true
          {{- end }}
          {{- range .mount }}
          - name: {{ .name }}
            mountPath: {{ .path }}
          {{- end }}
          {{- if $configMap }}
          envFrom:
            - configMapRef:
                name: {{ $configMap }}
          {{- end }}
          {{- if .env }}
          env:
            {{- range .env }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- end }}
              {{- if .config }}
              valueFrom:
                configMapKeyRef:
                  name: {{ .config.name }}
                  key: {{ .config.key | quote }}
              {{- end }}
              {{- if .secret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secret.name | quote }}
                  key: {{ .secret.key | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
      terminationGracePeriodSeconds: 101

---
{{- end }}

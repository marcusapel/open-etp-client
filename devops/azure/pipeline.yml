trigger:
  batch: true
  branches:
    include:
      - master
      - main
  paths:
    exclude:
      - /**/*.md
      - .gitignore
      - /docs

resources:
  repositories:
  - repository: FluxRepo
    type: git
    name: k8-gitops-manifests
  - repository: TemplateRepo
    type: git
    name: infra-azure-provisioning

variables:
  - group: 'Azure - OSDU'
  - group: 'Azure - OSDU Secrets'
  - name: chartPath
    value: "devops/azure/chart"
  - name: valuesFile
    value: "devops/azure/chart/helm-config.yaml"
  - name: 'MANIFEST_REPO'
    value: $[ resources.repositories['FluxRepo'].name ]
  - name: 'HELM_SOURCE'
    value: $[ resources.repositories['HelmRepo'].name ]

stages:
  - template: build-stage.yml
    parameters:
      buildDir: $(System.DefaultWorkingDirectory)

  - template: deploy-stages.yml
    parameters:
      serviceName: open-etp-client
      chartPath: ${{ variables.chartPath }}
      valuesFile: ${{ variables.valuesFile }}
      dockerFile: $(System.DefaultWorkingDirectory)/$(Build.Repository.Name)/devops/osdu/docker/Dockerfile.runtime
      dockerContext: $(System.DefaultWorkingDirectory)/$(Build.Repository.Name)
      providers:
        - name: Azure
          environments: ['demo']

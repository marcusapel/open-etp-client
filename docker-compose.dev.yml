# RDDMS Stack — docker-compose
#
# Keeps ONLY postgres (with existing demo data on port 5433).
# The C++ ETP server connects to this postgres.
# Our TypeScript etp-client runs natively (not in Docker) on port 8080.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d       # postgres + etp-server
#   cd etp-client && npm run dev                          # our client on :8080
#
# To tear down:
#   docker compose -f docker-compose.dev.yml down

services:
  # ─── PostgreSQL — reuses existing drogonresqml data volume ────────────────
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: foo
      POSTGRES_PASSWORD: bar
      POSTGRES_DB: rddms
    ports:
      - "5433:5432"
    volumes:
      - drogon_pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foo -d rddms"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Open ETP Server (C++ — ETP 1.2 + storage) ───────────────────────────
  etp-server:
    image: community.opengroup.org:5555/osdu/platform/domain-data-mgmt-services/reservoir/open-etp-server/open-etp-server-main:latest
    environment:
      POSTGRESQL_CONN_STRING: "host=postgres port=5432 dbname=rddms user=foo password=bar"
      RDMS_DATA_PARTITION_MODE: single
      RDMS_DATA_CONNECTIVITY_MODE: standalone
    ports:
      - "9002:9002"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["openETPServer", "server", "--start", "--overwrite", "--authN", "none", "--authZ", "none"]

volumes:
  # Re-use the existing drogonresqml postgres volume (has all test dataspaces)
  drogon_pgdata:
    external: true
    name: drogonresqml_pgdata
